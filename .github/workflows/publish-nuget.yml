name: Publish NuGet Package

on:
  workflow_dispatch:

jobs:
  publish:
    name: Build, Pack and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for NuGet Trusted Publishing (OIDC)

    steps:
      - name: NuGet OIDC
        uses: NuGet/login@v1
        id: login
        with:
          user: jakubiszon
