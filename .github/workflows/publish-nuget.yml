name: Publish NuGet Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Build, Pack and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          source-url: https://api.nuget.org/v3/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build ZuraTDD --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --solution ZuraTDD.slnx --no-build --configuration Release --verbosity normal

      - name: Pack NuGet package
        run: dotnet pack ZuraTDD -c Release --no-build --output ./artifacts

      - name: Push package to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --skip-duplicate --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
