name: Publish NuGet Package

on:
  workflow_dispatch:

jobs:
  publish:
    name: Build, Pack and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for NuGet Trusted Publishing (OIDC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build ZuraTDD --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --solution ZuraTDD.slnx --no-build --configuration Release --verbosity normal

      - name: Pack NuGet package
        run: dotnet pack ZuraTDD -c Release --no-build --output ./artifacts

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: jakubiszon

      - name: Push package to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --skip-duplicate --source https://api.nuget.org/v3/index.json --api-key ${{steps.login.outputs.NUGET_API_KEY}}
